<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>High-Height Mobile Bento</title>
</head>
<body class="bg-[#f0f2f5] p-4 md:p-12 flex flex-col items-center">

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 grid-flow-row-dense max-w-[1200px] w-full">

        <div class="lg:col-span-2 h-[400px] lg:h-[300px] p-3">
            <div class="w-full h-full bg-white rounded-[2.5rem] lg:rounded-[3rem] border border-gray-100 shadow-md flex items-center px-10">
                <div class="w-24 h-24 bg-blue-100 rounded-full"></div>
            </div>
        </div>
        
        <div class="col-span-1 h-[400px] lg:h-[300px] p-3">
            <div class="w-full h-full bg-[#e8f5e9] rounded-[2.5rem] lg:rounded-[3rem] border border-gray-100 shadow-md"></div>
        </div>

        <div class="col-span-1 lg:row-span-2 h-[400px] lg:h-[600px] p-3">
            <div class="w-full h-full bg-white rounded-[2.5rem] lg:rounded-[3rem] border border-gray-100 shadow-md flex flex-col items-center justify-center gap-6">
                <div class="w-16 h-16 bg-blue-50 rounded-2xl"></div>
                <div class="w-16 h-16 bg-yellow-50 rounded-2xl"></div>
            </div>
        </div>

        <div class="col-span-1 h-[400px] lg:h-[300px] p-3">
            <div class="w-full h-full bg-white rounded-[2.5rem] lg:rounded-[3rem] border border-gray-100 shadow-md flex items-center justify-center">
                <div class="w-32 h-14 bg-gray-200 rounded-full"></div>
            </div>
        </div>

        <div class="col-span-1 h-[400px] lg:h-[300px] p-3">
            <div class="w-full h-full bg-gradient-to-br from-purple-500 to-pink-500 rounded-[2.5rem] lg:rounded-[3rem] shadow-lg"></div>
        </div>

        <div class="lg:col-span-2 h-[400px] lg:h-[300px] p-3">
            <div class="w-full h-full bg-[#fff9c4] rounded-[2.5rem] lg:rounded-[3rem] border border-gray-100 shadow-md"></div>
        </div>

        <div class="col-span-1 lg:row-span-2 h-[400px] lg:h-[600px] p-3">
            <div class="w-full h-full bg-[#e0f7fa] rounded-[2.5rem] lg:rounded-[3rem] border border-gray-100 shadow-md"></div>
        </div>

        <div class="col-span-1 h-[400px] lg:h-[300px] p-3">
            <div class="w-full h-full bg-black rounded-[2.5rem] lg:rounded-[3rem] shadow-xl"></div>
        </div>

        <div class="lg:col-span-2 h-[400px] lg:h-[300px] p-3">
            <div class="w-full h-full bg-[#f3e5f5] rounded-[2.5rem] lg:rounded-[3rem] border border-gray-100 shadow-md"></div>
        </div>

        <div class="lg:col-span-2 h-[400px] lg:h-[300px] p-3">
            <div class="w-full h-full bg-white rounded-[2.5rem] lg:rounded-[3rem] border border-gray-100 shadow-md"></div>
        </div>

    </div>

</body>
</html>
